<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SpeedRank</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0c;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px;
      overflow-x: hidden;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,220,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,220,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .wrap {
      width: 100%;
      max-width: 480px;
      padding: 0 16px;
      position: relative;
      z-index: 1;
    }
    .header {
      text-align: center;
      padding: 36px 0 16px;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 5px;
      background: linear-gradient(135deg, #00dcff, #0066ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 11px;
      color: #444;
      letter-spacing: 4px;
      margin-top: 4px;
    }
    .unit-toggle {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .unit-btn {
      background: transparent;
      color: #00dcff;
      border: 1px solid #00dcff;
      border-radius: 5px;
      padding: 5px 20px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .unit-btn.active {
      background: #00dcff;
      color: #000;
    }
    .speed-box {
      background: linear-gradient(180deg, #111318, #0d0f14);
      border: 1px solid rgba(0,220,255,0.15);
      border-radius: 20px;
      padding: 28px 20px 20px;
      width: 100%;
      margin-bottom: 12px;
      transition: box-shadow 0.5s;
    }
    .speed-box.active {
      animation: glow 2s infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 20px rgba(0,220,255,0.2); }
      50% { box-shadow: 0 0 40px rgba(0,220,255,0.6); }
    }
    .big-speed {
      font-family: 'Orbitron', monospace;
      font-size: clamp(60px, 22vw, 96px);
      font-weight: 900;
      text-align: center;
      line-height: 1;
      color: #333;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .big-speed.active {
      color: #00dcff;
      text-shadow: 0 0 30px rgba(0,220,255,0.6);
    }
    .speed-label {
      text-align: center;
      color: #555;
      font-size: 13px;
      letter-spacing: 4px;
      margin-top: 6px;
    }
    .rec-dot {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff3366;
      box-shadow: 0 0 8px #ff3366;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .rec-text { color: #ff3366; font-size: 12px; letter-spacing: 2px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-bottom: 12px;
    }
    .stat-card {
      background: #111318;
      border: 1px solid rgba(0,220,255,0.1);
      border-radius: 14px;
      padding: 16px 14px;
    }
    .stat-label {
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }
    .stat-unit { font-size: 11px; color: #555; margin-left: 4px; }
    .highspeed-bar {
      background: #111318;
      border: 1px solid rgba(255,100,0,0.2);
      border-radius: 14px;
      padding: 14px 16px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .hs-label { color: #555; font-size: 10px; letter-spacing: 2px; }
    .hs-sub { color: #ff6600; font-size: 13px; letter-spacing: 1px; margin-top: 3px; }
    .hs-value {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: #ff6600;
    }
    .graph-card {
      background: #111318;
      border: 1px solid rgba(0,220,255,0.1);
      border-radius: 14px;
      padding: 16px;
      width: 100%;
      margin-bottom: 12px;
    }
    .graph-label { color: #444; font-size: 10px; letter-spacing: 2px; margin-bottom: 10px; }
    canvas { width: 100%; height: 110px; border-radius: 8px; display: block; }
    .rank-card {
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      text-align: center;
      margin-bottom: 16px;
      animation: rankReveal 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes rankReveal {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .rank-title { color: #555; font-size: 11px; letter-spacing: 3px; margin-bottom: 8px; }
    .rank-number {
      font-family: 'Orbitron', monospace;
      font-size: 76px;
      font-weight: 900;
      line-height: 1;
    }
    .rank-badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-top: 8px;
    }
    .error-box {
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,0,0,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff4444;
      font-size: 13px;
      width: 100%;
      margin-bottom: 12px;
    }
    .main-btn {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .main-btn:active { transform: scale(0.97); }
    .main-btn.start {
      background: linear-gradient(135deg, #00dcff, #0055ff);
      box-shadow: 0 4px 30px rgba(0,220,255,0.3);
    }
    .main-btn.stop {
      background: linear-gradient(135deg, #ff2244, #cc0033);
      box-shadow: 0 4px 30px rgba(255,34,68,0.4);
    }
    .footer-note {
      margin-top: 20px;
      color: #222;
      font-size: 11px;
      letter-spacing: 2px;
      text-align: center;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="wrap">

      <div class="subtitle">TRIP TRACKER</div>

  </div>

  <script>
    let tracking = false;
    let watchId = null;
    let timerInterval = null;
    let unit = 'mph';
    let speedHistory = [];
    let speedSamples = [];
    let maxSpeed = 0;
    let elapsed = 0;
    let distance = 0;
    let highSpeedTime = 0;
    let lastPos = null;
    let hsInterval = null;
    let currentSpeed = 0;

    const HIGH_SPEED = { mph: 60, kmh: 96 };

    function setUnit(u) {
      unit = u;
      document.getElementById('btn-mph').classList.toggle('active', u === 'mph');
      document.getElementById('btn-kmh').classList.toggle('active', u === 'kmh');
      document.getElementById('speed-label').textContent = u.toUpperCase() + ' · CURRENT';
      document.getElementById('unit-max').textContent = u === 'mph' ? 'mph' : 'km/h';
      document.getElementById('unit-avg').textContent = u === 'mph' ? 'mph' : 'km/h';
      document.getElementById('hs-sub').textContent = 'ABOVE ' + HIGH_SPEED[u] + ' ' + (u === 'mph' ? 'mph' : 'km/h');
    }

    function toUnit(mps) {
      return unit === 'mph' ? mps * 2.23694 : mps * 3.6;
    }

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return h + 'h ' + m + 'm ' + sec + 's';
      if (m > 0) return m + 'm ' + sec + 's';
      return sec + 's';
    }

    function formatDist(meters) {
      return (meters / 1609.34).toFixed(1);
    }

    function calcDist(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function getRankColor(r) {
      if (r >= 300) return '#ff4400';
      if (r >= 150) return '#ff8800';
      if (r >= 80) return '#ffdd00';
      return '#00dcff';
    }

    function getRankLabel(r) {
      if (r >= 300) return 'LEGENDARY 🔥🔥';
      if (r >= 150) return 'ELITE 🔥';
      if (r >= 80) return 'PRO';
      return 'DRIVER';
    }

    function drawGraph() {
      const canvas = document.getElementById('speed-canvas');
      if (!canvas || speedHistory.length < 2) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.offsetWidth * window.devicePixelRatio;
      const H = 110 * window.devicePixelRatio;
      canvas.width = W;
      canvas.height = H;
      ctx.clearRect(0, 0, W, H);
      const cap = Math.max(maxSpeed, 80);
      const pts = speedHistory.slice(-300);
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, 'rgba(0,220,255,0.45)');
      grad.addColorStop(1, 'rgba(0,220,255,0.02)');
      ctx.beginPath();
      ctx.moveTo(0, H);
      pts.forEach((spd, i) => {
        const x = (i / (pts.length - 1)) * W;
        const y = H - (spd / cap) * H;
        ctx.lineTo(x, y);
      });
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.beginPath();
      pts.forEach((spd, i) => {
        const x = (i / (pts.length - 1)) * W;
        const y = H - (spd / cap) * H;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = '#00dcff';
      ctx.lineWidth = 2 * window.devicePixelRatio;
      ctx.shadowColor = '#00dcff';
      ctx.shadowBlur = 8;
      ctx.stroke();
    }

    function resetState() {
      speedHistory = [];
      speedSamples = [];
      maxSpeed = 0;
      elapsed = 0;
      distance = 0;
      highSpeedTime = 0;
      lastPos = null;
      currentSpeed = 0;
      document.getElementById('big-speed').textContent = '0.0';
      document.getElementById('stat-max').innerHTML = '0.0<span class="stat-unit" id="unit-max">' + (unit==='mph'?'mph':'km/h') + '</span>';
      document.getElementById('stat-avg').innerHTML = '0.0<span class="stat-unit" id="unit-avg">' + (unit==='mph'?'mph':'km/h') + '</span>';
      document.getElementById('stat-dist').innerHTML = '0.0<span class="stat-unit">mi</span>';
      document.getElementById('stat-time').textContent = '0s';
      document.getElementById('stat-hs').textContent = '0s';
      document.getElementById('graph-card').style.display = 'none';
      document.getElementById('rank-card').classList.add('hidden');
      document.getElementById('error-box').classList.add('hidden');
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.classList.remove('hidden');
    }

    function toggleTrip() {
      if (tracking) stopTrip();
      else startTrip();
    }

    function startTrip() {
      if (!navigator.geolocation) {
        showError('GPS not supported on this device.');
        return;
      }
      resetState();
      tracking = true;

      const btn = document.getElementById('main-btn');
      btn.textContent = '⏹ END TRIP';
      btn.className = 'main-btn stop';

      document.getElementById('speed-box').classList.add('active');
      document.getElementById('big-speed').classList.add('active');
      document.getElementById('rec-dot').classList.remove('hidden');

      const startTime = Date.now();
      timerInterval = setInterval(() => {
        elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('stat-time').textContent = formatTime(elapsed);
        if (currentSpeed >= HIGH_SPEED[unit]) {
          highSpeedTime++;
          document.getElementById('stat-hs').textContent = formatTime(highSpeedTime);
        }
        if (speedHistory.length > 1) drawGraph();
      }, 1000);

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const spd = pos.coords.speed || 0;
          const spdDisplay = parseFloat(toUnit(spd).toFixed(1));
          currentSpeed = spdDisplay;

          document.getElementById('big-speed').textContent = spdDisplay.toFixed(1);

          if (spdDisplay > maxSpeed) {
            maxSpeed = spdDisplay;
            document.getElementById('stat-max').innerHTML = maxSpeed.toFixed(1) + '<span class="stat-unit" id="unit-max">' + (unit==='mph'?'mph':'km/h') + '</span>';
          }

          speedSamples.push(spdDisplay);
          const avg = speedSamples.reduce((a,b)=>a+b,0) / speedSamples.length;
          document.getElementById('stat-avg').innerHTML = avg.toFixed(1) + '<span class="stat-unit" id="unit-avg">' + (unit==='mph'?'mph':'km/h') + '</span>';

          if (lastPos) {
            distance += calcDist(lastPos.lat, lastPos.lon, pos.coords.latitude, pos.coords.longitude);
            document.getElementById('stat-dist').innerHTML = formatDist(distance) + '<span class="stat-unit">mi</span>';
          }
          lastPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };

          speedHistory.push(spdDisplay);
          if (speedHistory.length > 1) {
            document.getElementById('graph-card').style.display = 'block';
            drawGraph();
          }
        },
        (err) => showError('GPS error: ' + err.message),
        { enableHighAccuracy: true, maximumAge: 500, timeout: 15000 }
      );
    }

    function stopTrip() {
      tracking = false;
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      clearInterval(timerInterval);

      const btn = document.getElementById('main-btn');
      btn.textContent = '▶ START TRIP';
      btn.className = 'main-btn start';

      document.getElementById('speed-box').classList.remove('active');
      document.getElementById('big-speed').classList.remove('active');
      document.getElementById('rec-dot').classList.add('hidden');

      // Calculate rank
      const avg = speedSamples.length ? speedSamples.reduce((a,b)=>a+b,0)/speedSamples.length : 0;
      const dist = parseFloat(formatDist(distance));
      const rank = Math.round((maxSpeed * 0.4 + avg * 0.4 + dist * 0.2) * 10) / 10;
      const color = getRankColor(rank);

      const card = document.getElementById('rank-card');
      card.style.background = 'linear-gradient(135deg, #111318, #0d1020)';
      card.style.border = '1px solid ' + color + '40';
      card.style.boxShadow = '0 0 40px ' + color + '20';
      document.getElementById('rank-number').textContent = rank;
      document.getElementById('rank-number').style.color = color;
      document.getElementById('rank-number').style.textShadow = '0 0 30px ' + color;
      document.getElementById('rank-badge').textContent = getRankLabel(rank);
      document.getElementById('rank-badge').style.color = color;
      card.classList.remove('hidden');
    }
  </script>

</body>
</html>
